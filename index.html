<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #161426 0%, #0d0b1a 100%);
            --card-dark: #1b1730;
            --input-bg: #231e3d;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --color-period: #e28da2;
            --bleed-gradient: linear-gradient(135deg, #da7a92 0%, #c45470 100%);
            --color-ovulation: #5c7aff; /* Brightened for highlight */
            --color-text-highlight: #ffffff;
            --text-light: #f1f5f9;
            --text-muted: #8e8aa7;
        }

        /* Highlighting Classes */
        .highlight-accent { background: var(--color-period); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .highlight-fertility { background: var(--color-ovulation); color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .highlight-buffer { background: rgba(255, 255, 255, 0.1); color: var(--text-light); padding: 2px 6px; border-radius: 4px; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background: var(--bg-gradient); color: var(--text-light); padding: 30px 15px; display: flex; justify-content: center; min-height: 100vh; }

        .hidden { display: none !important; }

        /* ... [Keep existing Welcome Screen and Dashboard CSS] ... */
        .month-details-sidebar { background: rgba(27, 23, 48, 0.6); border: 1px dashed rgba(255, 255, 255, 0.08); padding: 25px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); font-size: 0.9rem; }
        
        /* ... [Keep existing Calendar and Legend CSS] ... */
    </style>
</head>
<body>

    <script>
        // ... [Keep existing event listener] ...

        function renderSplitViewWorkspace(container, matrix) {
            // ... [Keep existing calendar rendering code] ...

            // RIGHT SIDE: Sidebar Metadata Detail Box
            const sidebar = document.createElement('div');
            sidebar.className = 'month-details-sidebar';
            
            const formatDateStr = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            // Calculate +/- 3 day buffers
            let earlyDate = new Date(matrix.periodStart); earlyDate.setDate(earlyDate.getDate() - 3);
            let lateDate = new Date(matrix.periodStart); lateDate.setDate(lateDate.getDate() + 3);

            sidebar.innerHTML = `
                <div style="font-family:'Playfair Display', serif; font-size:1.2rem; font-weight:600; margin-bottom:5px;">Cycle Breakdown</div>
                <div class="detail-row"><span>Early Cycle (-3 days)</span><span class="highlight-buffer">${formatDateStr(earlyDate)}</span></div>
                <div class="detail-row"><span>Estimated Period Start</span><span class="highlight-accent">${formatDateStr(matrix.periodStart)}</span></div>
                <div class="detail-row"><span>Peak Fertility Window</span><span class="highlight-fertility">${formatDateStr(matrix.ovulationPeak)}</span></div>
                <div class="detail-row"><span>Late Cycle (+3 days)</span><span class="highlight-buffer">${formatDateStr(lateDate)}</span></div>
                <div class="detail-row"><span>Phase Context</span><span>${matrix.sequenceIndex === 1 ? 'Immediate Forecast' : matrix.sequenceIndex === 2 ? 'Extended Horizon' : 'Quarter Horizon'}</span></div>
            `;
            
            dualWorkspaceBlock.appendChild(sidebar);
            container.appendChild(dualWorkspaceBlock);
        }
        
        // ... [Keep existing PDF export code] ...
    </script>
</body>
</html>
