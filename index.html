<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier — Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #161426 0%, #0d0b1a 100%);
            --card-dark: #1b1730;
            --color-period: #e28da2;
            --bleed-gradient: linear-gradient(135deg, #da7a92 0%, #c45470 100%);
            --color-ovulation: #1c2e5c;
            --text-light: #f1f5f9;
            --text-muted: #8e8aa7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-light); padding: 40px; min-height: 100vh; display: flex; justify-content: center; }
        .hidden { display: none !important; }

        /* Header Updates */
        .dashboard-screen { width: 100%; max-width: 1200px; }
        .header-main { margin-bottom: 30px; }
        .premium-header-text { font-family: 'Playfair Display', serif; font-size: 2.5rem; }
        .user-meta { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; letter-spacing: 0.5px; }

        /* Calendar & Layout */
        .continuum-grid-container { display: flex; flex-direction: column; gap: 30px; }
        .month-dual-workspace { display: grid; grid-template-columns: 1.4fr 1fr; gap: 30px; background: var(--card-dark); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        
        .calendar-grid-core { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-node-element { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-size: 0.9rem; }
        
        /* Shading */
        .period-bleed-span .day-node-element { background: var(--bleed-gradient); color: white; }
        .ovulation-peak-anchor .day-node-element { background: var(--color-ovulation); border: 1px solid #5c7aff; }

        /* Sidebar Styles */
        .month-details-sidebar { display: flex; flex-direction: column; gap: 12px; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 10px; font-size: 0.9rem; background: rgba(255,255,255,0.03); }
        .period-highlight { background: rgba(226,141,162,0.15); border-left: 4px solid var(--color-period); }
        .fertile-highlight { background: rgba(92,122,255,0.15); border-left: 4px solid #5c7aff; }
    </style>
</head>
<body>

    <div id="dashboard-screen" class="dashboard-screen">
        <header class="header-main">
            <div class="premium-header-text" id="greeting">Hello</div>
            <div class="user-meta" id="sub-header">Workspace Continuum</div>
        </header>
        <div id="continuum-injection-target" class="continuum-grid-container"></div>
    </div>

    <script>
        // Mock data initialization
        const userData = { name: "User", cycle: 28, bleed: 5, start: new Date() };

        function render() {
            document.getElementById('greeting').innerText = `Hello, ${userData.name}`;
            document.getElementById('sub-header').innerHTML = `Workspace Continuum <br> Age: 26 | Cycle: ${userData.cycle} Days | Bleed: ${userData.bleed} Days`;
            
            const target = document.getElementById('continuum-injection-target');
            
            for (let m = 1; m <= 3; m++) {
                let pStart = new Date(); pStart.setDate(pStart.getDate() + (userData.cycle * m));
                let pEnd = new Date(pStart); pEnd.setDate(pStart.getDate() + userData.bleed - 1);
                let peak = new Date(pStart); peak.setDate(pStart.getDate() - 14);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'month-dual-workspace';
                
                wrapper.innerHTML = `
                    <div class="calendar-track">
                        <h3 style="margin-bottom:15px;">${pStart.toLocaleString('default', {month:'long'})}</h3>
                        <div class="calendar-grid-core">${renderDays(pStart, pEnd, peak)}</div>
                    </div>
                    <div class="month-details-sidebar">
                        <div style="font-family:serif; font-size:1.2rem; margin-bottom:5px;">Cycle Breakdown</div>
                        <div class="detail-row period-highlight"><span>🩸 Estimated Period Start</span><span>${pStart.toLocaleDateString()}</span></div>
                        <div class="detail-row period-highlight"><span>🩸 Estimated Period End</span><span>${pEnd.toLocaleDateString()}</span></div>
                        <div class="detail-row fertile-highlight"><span>🌸 Peak Fertility</span><span>${peak.toLocaleDateString()}</span></div>
                    </div>
                `;
                target.appendChild(wrapper);
            }
        }

        function renderDays(pStart, pEnd, peak) {
            let html = '';
            for(let i=1; i<=28; i++) {
                let d = new Date(pStart); d.setDate(pStart.getDate() + i - 1);
                let cls = (d >= pStart && d <= pEnd) ? 'period-bleed-span' : (d.toDateString() === peak.toDateString() ? 'ovulation-peak-anchor' : '');
                html += `<div class="${cls}"><div class="day-node-element">${i}</div></div>`;
            }
            return html;
        }

        render();
    </script>
</body>
</html>
