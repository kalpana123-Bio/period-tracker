<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier — Elite Architectural Workspace</title>
    <!-- Premium Google Fonts Framework -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2pdf Framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #05060a;
            --card-dark: #0e1017;
            --input-bg: #141722;
            --border-gold: rgba(212, 175, 55, 0.08);
            --luxury-gold: #d4af37;
            --rose-gold: #e5ad9f;
            
            /* Precision System Color Matrix Nodes */
            --bleed-solid: #b52b3f;
            --bleed-gradient: linear-gradient(90deg, #991f30 0%, #cc3b50 100%);
            --early-gold-lite: rgba(212, 175, 55, 0.05);
            --late-teal-lite: rgba(26, 188, 156, 0.05);
            --ovulation-base-hue: 282, 44%, 47%; /* HSL values used for structural alpha wave curves */
            
            --text-light: #f1f5f9;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 40px 25px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        /* Concierge Level Form Workspace */
        .welcome-screen {
            width: 100%;
            max-width: 620px;
            margin: auto;
            background: linear-gradient(145deg, #10121f 0%, #080911 100%);
            padding: 55px 50px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            text-align: center;
            box-shadow: 0 40px 90px rgba(0,0,0,0.85);
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 30%, var(--rose-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 45px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            font-size: 0.95rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 15px rgba(229, 173, 159, 0.1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(79%) sepia(20%) saturate(600%) hue-rotate(320deg) brightness(95%) contrast(90%);
        }

        button.btn-prime {
            background: linear-gradient(135deg, var(--rose-gold) 0%, #ca9082 100%);
            color: #05060a;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button.btn-prime:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 35px rgba(229, 173, 159, 0.2);
        }

        /* Active Core Workspace Viewport Dashboard */
        .dashboard-screen {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 35px;
        }

        .premium-header-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 500;
        }

        .user-meta {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .btn-pdf {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--rose-gold);
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-pdf:hover {
            border-color: var(--rose-gold);
            background: rgba(229, 173, 159, 0.02);
        }

        .continuum-grid-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .month-card-track {
            background: var(--card-dark);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.01);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        .month-title-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-badge-index {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.04);
            padding: 6px 14px;
            border-radius: 30px;
            color: var(--rose-gold);
        }

        /* Calendar Render Engine Components Layout Grid */
        .calendar-grid-core {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 12px;
            column-gap: 0px;
            text-align: center;
        }

        .weekday-label {
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .day-node-wrapper {
            position: relative;
            padding: 2px 0;
        }

        .day-node-element {
            aspect-ratio: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
            position: relative;
            z-index: 2;
            border-radius: 50%;
        }

        .day-node-wrapper.has-base-fill .day-node-element {
            background: #11131c;
        }

        .day-micro-tag {
            position: absolute;
            bottom: 3px;
            font-size: 0.48rem;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        /* 🩸 RULE 1: DEEP SATURATION PERIOD CAPSULES */
        .day-node-wrapper.period-bleed-span {
            background: var(--bleed-gradient);
            border-radius: 0px;
        }
        .day-node-wrapper.period-bleed-span .day-node-element {
            color: #ffffff !important;
            font-weight: 700;
            background: transparent !important;
        }
        .day-node-wrapper.bleed-start-cap {
            border-top-left-radius: 50% !important;
            border-bottom-left-radius: 50% !important;
        }
        .day-node-wrapper.bleed-end-cap {
            border-top-right-radius: 50% !important;
            border-bottom-right-radius: 50% !important;
        }

        /* 🌟 RULE 2: EARLY & LATE LIGHT PREDICTION TILES */
        .day-node-wrapper.early-buffer-zone {
            background-color: var(--early-gold-lite);
            border-top: 1px dashed rgba(212, 175, 55, 0.25);
            border-bottom: 1px dashed rgba(212, 175, 55, 0.25);
        }
        .day-node-wrapper.early-buffer-zone.buffer-start-cap {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-left: 1px dashed rgba(212, 175, 55, 0.25);
        }
        .day-node-wrapper.early-buffer-zone .day-node-element {
            color: #d4af37;
        }

        .day-node-wrapper.late-buffer-zone {
            background-color: var(--late-teal-lite);
            border-top: 1px dashed rgba(26, 188, 156, 0.25);
            border-bottom: 1px dashed rgba(26, 188, 156, 0.25);
        }
        .day-node-wrapper.late-buffer-zone.buffer-end-cap {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-right: 1px dashed rgba(26, 188, 156, 0.25);
        }
        .day-node-wrapper.late-buffer-zone .day-node-element {
            color: #1abc9c;
        }

        /* 🔮 RULE 3: WAVE GRADIENT CELL RULES (MATHEMATICAL OPACITY SLIDES) */
        .day-node-wrapper.ovulation-wave-node .day-node-element {
            background: hsla(var(--ovulation-base-hue), var(--wave-alpha)) !important;
            color: #ffffff;
            border-radius: 50% !important;
        }

        /* Peak Anchor Point Accent Overrides */
        .day-node-wrapper.ovulation-peak-anchor .day-node-element {
            background: hsl(var(--ovulation-base-hue)) !important;
            color: #ffffff !important;
            font-weight: 700;
            box-shadow: 0 4px 18px hsla(var(--ovulation-base-hue), 0.5);
            border-radius: 50% !important;
        }

        /* Universal Master Legends Tray */
        .master-legend-card {
            background: var(--card-dark);
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.01);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .legend-swatch {
            width: 24px;
            height: 14px;
            border-radius: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- 1. FORM SETUP LANDING FRAME WORKSPACE -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-title">Cycle Atelier — Welcome Ma'am</div>
        <p>Premium architectural forecasting engine mapping 3 consecutive hormonal horizons.</p>
        
        <form id="onboarding-form">
            <!-- Row 1: Identity and Age -->
            <div class="form-row">
                <div class="form-group">
                    <label for="user-name">First Name</label>
                    <input type="text" id="user-name" placeholder="Sarah" required>
                </div>
                <div class="form-group" style="flex: 0 0 150px;">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" min="10" max="100" placeholder="26" required>
                </div>
            </div>

            <!-- Row 2: Anchor Historical Start Datum -->
            <div class="form-row">
                <div class="form-group">
                    <label for="last-period">When did your last period begin?</label>
                    <input type="date" id="last-period" required>
                </div>
            </div>

            <!-- Row 3: Personalized Metrics Updates Targets -->
            <div class="form-row">
                <div class="form-group">
                    <label for="cycle-days">Average Cycle Occurrence</label>
                    <input type="number" id="cycle-days" min="22" max="45" value="28" required>
                </div>
                <div class="form-group">
                    <label for="period-duration">Average Bleeding Duration</label>
                    <input type="number" id="period-duration" min="2" max="10" value="5" required>
                </div>
            </div>

            <button type="submit" class="btn-prime">Initialize System Blueprint</button>
        </form>
    </div>

    <!-- 2. SYSTEM MAIN DATA PRESENTATION LAYOUT VIEWPORT -->
    <div id="dashboard-screen" class="dashboard-screen hidden">
        <header>
            <div>
                <!-- String target variable match framework update -->
                <div class="premium-header-text">Workspace Continuum — Hello, <span id="display-name">Name</span></div>
                <div id="user-meta-info" class="user-meta">--</div>
            </div>
            <button id="download-pdf-btn" class="btn-pdf">Export Continuum Vector Map</button>
        </header>

        <div class="continuum-grid-container" id="pdf-content">
            
            <!-- MASTER SYSTEM LEGENDS TRAY ELEMENT -->
            <div class="master-legend-card">
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--early-gold-lite); border: 1px dashed rgba(212, 175, 55, 0.4);"></div>
                    <span>Early Prediction (-3d Margin)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--bleed-gradient);"></div>
                    <span style="color: var(--rose-gold); font-weight:600;">True Bleed Window (Start to End)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--late-teal-lite); border: 1px dashed rgba(26, 188, 156, 0.4);"></div>
                    <span>Late Prediction (+3d Margin)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: linear-gradient(90deg, hsla(var(--ovulation-base-hue), 0.08) 0%, hsl(var(--ovulation-base-hue)) 100%); border-radius:4px;"></div>
                    <span>Ovulation Wave (Light → Dark Peak → Light)</span>
                </div>
            </div>

            <!-- Target Injection Wrapper Grid Container -->
            <div id="continuum-injection-target" class="continuum-grid-container"></div>
        </div>
    </div>

    <script>
        let userData = {};

        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();

            userData.name = document.getElementById('user-name').value;
            userData.age = document.getElementById('user-age').value;
            userData.lastPeriod = new Date(document.getElementById('last-period').value);
            userData.cycleLength = parseInt(document.getElementById('cycle-days').value);
            userData.periodDuration = parseInt(document.getElementById('period-duration').value);

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');

            document.getElementById('display-name').innerText = userData.name;
            document.getElementById('user-meta-info').innerText = 
                `Tracking Matrix Parameters: Age ${userData.age}  |  Occurrence Cycle: ${userData.cycleLength} Days  |  Bleed Metric: ${userData.periodDuration} Days`;

            generateThreeMonthContinuum();
        });

        function generateThreeMonthContinuum() {
            const targetContainer = document.getElementById('continuum-injection-target');
            targetContainer.innerHTML = ''; 

            let structuralAnchorDates = [];
            
            // Loop and compile math profiles for 3 separate consecutive future windows
            for (let m = 1; m <= 3; m++) {
                let cycleStartAnchor = new Date(userData.lastPeriod);
                cycleStartAnchor.setDate(userData.lastPeriod.getDate() + (userData.cycleLength * m));

                let bleedEndAnchor = new Date(cycleStartAnchor);
                bleedEndAnchor.setDate(cycleStartAnchor.getDate() + (userData.periodDuration - 1));

                let ovulationPeakAnchor = new Date(cycleStartAnchor);
                ovulationPeakAnchor.setDate(cycleStartAnchor.getDate() - 14);

                structuralAnchorDates.push({
                    sequenceIndex: m,
                    periodStart: cycleStartAnchor,
                    periodEnd: bleedEndAnchor,
                    ovulationPeak: ovulationPeakAnchor,
                    monthRepresentation: cycleStartAnchor.getMonth(),
                    yearRepresentation: cycleStartAnchor.getFullYear()
                });
            }

            structuralAnchorDates.forEach(matrixData => {
                renderContinuumMonthCard(targetContainer, matrixData);
            });
        }

        function renderContinuumMonthCard(container, matrix) {
            const monthLabels = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const cardTrack = document.createElement('div');
            cardTrack.className = 'month-card-track';

            const header = document.createElement('div');
            header.className = 'month-title-header';
            header.innerHTML = `
                <span>${monthLabels[matrix.monthRepresentation]} ${matrix.yearRepresentation}</span>
                <span class="month-badge-index">Forecast Horizon Matrix 0${matrix.sequenceIndex}</span>
            `;
            cardTrack.appendChild(header);

            const gridCore = document.createElement('div');
            gridCore.className = 'calendar-grid-core';

            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(wk => {
                const label = document.createElement('div');
                label.className = 'weekday-label';
                label.innerText = wk;
                gridCore.appendChild(label);
            });

            const firstDayIndex = new Date(matrix.yearRepresentation, matrix.monthRepresentation, 1).getDay();
            const totalDaysInMonth = new Date(matrix.yearRepresentation, matrix.monthRepresentation + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyNode = document.createElement('div');
                emptyNode.className = 'day-node-wrapper empty';
                gridCore.appendChild(emptyNode);
            }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'day-node-wrapper has-base-fill';

                const cell = document.createElement('div');
                cell.className = 'day-node-element';
                cell.innerText = day;
                wrapper.appendChild(cell);

                const currentEvalDate = new Date(matrix.yearRepresentation, matrix.monthRepresentation, day);
                const tag = document.createElement('span');
                tag.className = 'day-micro-tag';

                let earlyPredictionThresholdStart = new Date(matrix.periodStart);
                earlyPredictionThresholdStart.setDate(matrix.periodStart.getDate() - 3);

                let latePredictionThresholdEnd = new Date(matrix.periodEnd);
                latePredictionThresholdEnd.setDate(matrix.periodEnd.getDate() + 3);

                // --- COMPUTATIONAL PRIORITY LAYER DISPATCHER ---
                
                // 1. SOLID PERIOD RADIAL CAPSULE
                if (currentEvalDate >= matrix.periodStart && currentEvalDate <= matrix.periodEnd) {
                    wrapper.className = 'day-node-wrapper period-bleed-span';
                    if (currentEvalDate.toDateString() === matrix.periodStart.toDateString()) {
                        wrapper.classList.add('bleed-start-cap');
                        tag.innerText = 'Start';
                        tag.style.color = '#fff';
                        cell.appendChild(tag);
                    } else if (currentEvalDate.toDateString() === matrix.periodEnd.toDateString()) {
                        wrapper.classList.add('bleed-end-cap');
                        tag.innerText = 'End';
                        tag.style.color = '#fff';
                        cell.appendChild(tag);
                    } else {
                        tag.innerText = 'Bleed';
                        tag.style.color = 'rgba(255,255,255,0.4)';
                        cell.appendChild(tag);
                    }
                }
                // 2. LIGHT EARLY MARGIN
                else if (currentEvalDate >= earlyPredictionThresholdStart && currentEvalDate < matrix.periodStart) {
                    wrapper.className = 'day-node-wrapper early-buffer-zone';
                    if (currentEvalDate.toDateString() === earlyPredictionThresholdStart.toDateString()) {
                        wrapper.classList.add('buffer-start-cap');
                    }
                    tag.innerText = 'Early';
                    tag.style.color = 'rgba(212, 175, 55, 0.6)';
                    cell.appendChild(tag);
                }
                // 3. LIGHT LATE MARGIN
                else if (currentEvalDate > matrix.periodEnd && currentEvalDate <= latePredictionThresholdEnd) {
                    wrapper.className = 'day-node-wrapper late-buffer-zone';
                    if (currentEvalDate.toDateString() === latePredictionThresholdEnd.toDateString()) {
                        wrapper.classList.add('buffer-end-cap');
                    }
                    tag.innerText = 'Late';
                    tag.style.color = 'rgba(26, 188, 156, 0.6)';
                    cell.appendChild(tag);
                }
                // 4. THE WAVE GRADIENT ENGINE: (LIGHT -> DARK -> LIGHT BELL-CURVE OPACITY LAYER)
                else {
                    let dayDifferenceFromPeak = Math.round((currentEvalDate - matrix.ovulationPeak) / (1000 * 60 * 60 * 24));
                    
                    if (dayDifferenceFromPeak === 0) {
                        // Absolute Peak Center Point
                        wrapper.className = 'day-node-wrapper ovulation-peak-anchor';
                        tag.innerText = 'Peak';
                        tag.style.color = '#ffffff';
                        cell.appendChild(tag);
                    } 
                    // High-Mid Shading (Approaching / Departing)
                    else if (dayDifferenceFromPeak === -1 || dayDifferenceFromPeak === 1) {
                        wrapper.className = 'day-node-wrapper ovulation-wave-node';
                        wrapper.style.setProperty('--wave-alpha', '0.45');
                        tag.innerText = 'High';
                        tag.style.color = '#e0b0ff';
                        cell.appendChild(tag);
                    } 
                    // Intermediate Fertile Window Shading
                    else if (dayDifferenceFromPeak === -2 || dayDifferenceFromPeak === 2) {
                        wrapper.className = 'day-node-wrapper ovulation-wave-node';
                        wrapper.style.setProperty('--wave-alpha', '0.28');
                        tag.innerText = 'Fertile';
                        tag.style.color = '#d6a2e8';
                        cell.appendChild(tag);
                    } 
                    // Soft Outermost Wave Limits
                    else if (dayDifferenceFromPeak === -3 || dayDifferenceFromPeak === 3) {
                        wrapper.className = 'day-node-wrapper ovulation-wave-node';
                        wrapper.style.setProperty('--wave-alpha', '0.15');
                        tag.innerText = 'Wave';
                        tag.style.color = 'rgba(214, 162, 232, 0.6)';
                        cell.appendChild(tag);
                    } 
                    // Distant Onset Boundary (Faintest Initial Shading)
                    else if (dayDifferenceFromPeak === -4 || dayDifferenceFromPeak === -5) {
                        wrapper.className = 'day-node-wrapper ovulation-wave-node';
                        wrapper.style.setProperty('--wave-alpha', '0.08');
                        tag.innerText = 'Onset';
                        tag.style.color = 'rgba(214, 162, 232, 0.4)';
                        cell.appendChild(tag);
                    }
                }

                gridCore.appendChild(wrapper);
            }

            cardTrack.appendChild(gridCore);
            container.appendChild(cardTrack);
        }

        // Vector Export Component Module Hooks
        document.getElementById('download-pdf-btn').addEventListener('click', function() {
            const element = document.getElementById('pdf-content');
            const pdfOptions = {
                margin:       12,
                filename:     `${userData.name || 'User'}_Atelier_90Day_Continuum.pdf`,
                image:        { type: 'jpeg', quality: 0.99 },
                html2canvas:  { scale: 2.2, logging: false, backgroundColor: '#05060a' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(pdfOptions).from(element).save();
        });
    </script>
</body>
</html>
