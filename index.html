<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-dark: #0b0a15;
            --bg-gradient: linear-gradient(180deg, #161426 0%, #0d0b1a 100%);
            --card-dark: #1b1730;
            --input-bg: #231e3d;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --color-period: #e28da2;
            --bleed-gradient: linear-gradient(135deg, #da7a92 0%, #c45470 100%);
            --color-ovulation: #1c2e5c;
            --text-light: #f1f5f9;
            --text-muted: #8e8aa7;
        }

        /* 1. Use the same font everywhere */
        body, input, button, label, .detail-row, .month-title-header, .premium-header-text, .user-meta {
            font-family: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-gradient); color: var(--text-light); padding: 30px 15px; display: flex; justify-content: center; min-height: 100vh; }
        .hidden { display: none !important; }

        .welcome-screen { width: 100%; max-width: 580px; margin: auto; background: #151226; padding: 45px 35px; border-radius: 24px; border: 1px solid var(--border-subtle); text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .welcome-title { font-size: 2.8rem; font-weight: 600; color: #ffffff; margin-bottom: 30px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; text-align: left; }
        label { margin-bottom: 8px; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; font-size: 1rem; color: white; outline: none; }
        button.btn-prime { background: linear-gradient(135deg, #e28da2 0%, #c45470 100%); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; }
        
        .dashboard-screen { width: 100%; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 30px; }
        .premium-header-text { font-size: 2.2rem; }
        .btn-pdf { background: transparent; border: 1px solid var(--border-subtle); color: var(--color-period); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        .continuum-grid-container { display: flex; flex-direction: column; gap: 30px; }
        .month-dual-workspace { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .month-dual-workspace { grid-template-columns: 1.4fr 1fr; } }
        
        .month-card-track { background: var(--card-dark); padding: 25px; border-radius: 20px; border: 1px solid var(--border-subtle); }
        .month-title-header { font-size: 1.4rem; margin-bottom: 20px; }
        .month-details-sidebar { background: rgba(27, 23, 48, 0.6); border: 1px dashed rgba(255, 255, 255, 0.08); padding: 25px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); font-size: 1rem; }
        .detail-row span:first-child { color: var(--text-muted); }
        .detail-row span:last-child { font-weight: 600; color: #ffffff; }

        .detail-row.period-highlight { background: rgba(226,141,162,0.18); border-left:5px solid #e28da2; padding:12px; border-radius:10px; }
        .detail-row.fertile-highlight { background: rgba(94,80,220,0.20); border-left:5px solid #7b68ee; padding:12px; border-radius:10px; }
        .detail-row.earlylate-highlight { background: rgba(255,255,255,0.05); border-left:5px solid rgba(255,255,255,0.15); padding:12px; border-radius:10px; }

        .calendar-grid-core { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 12px; text-align: center; }
        .weekday-label { font-weight: 600; color: var(--text-muted); padding-bottom: 10px; font-size: 0.8rem; }
        .day-node-wrapper { position: relative; padding: 4px 0; }
        .day-node-element { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; border-radius: 50%; width: 36px; margin: 0 auto; }
        
        /* 4. Make Period Start more visible */
        .day-node-wrapper.period-bleed-span .day-node-element {
            background: linear-gradient(135deg,#ff7ca5,#d64d78);
            color:white;
            font-weight:700;
            box-shadow:0 0 10px rgba(255,105,150,.45);
        }
        .day-node-wrapper.fertility-window .day-node-element{ background:rgba(123,104,238,0.35); color:#fff; font-weight:600; }
        .day-node-wrapper.ovulation-peak-anchor .day-node-element{ background:#7b68ee; color:#fff; font-weight:bold; box-shadow:0 0 12px rgba(123,104,238,.7); }
        .day-node-wrapper.early-cycle .day-node-element{ background:rgba(0,255,0,0.18); color:#fff; }
        .day-node-wrapper.late-cycle .day-node-element{ background:rgba(255,165,0,0.18); color:#fff; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-title">Welcome Ma'am</div>
        <form id="onboarding-form">
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text" id="user-name" placeholder="Sarah" required></div>
                <div class="form-group"><label>Age</label><input type="number" id="user-age" placeholder="26" required></div>
            </div>
            <div class="form-row"><div class="form-group"><label>Last period began</label><input type="date" id="last-period" required></div></div>
            <div class="form-row">
                <div class="form-group"><label>Cycle Days</label><input type="number" id="cycle-days" value="28" required></div>
                <div class="form-group"><label>Bleed Days</label><input type="number" id="period-duration" value="5" required></div>
            </div>
            <button type="submit" class="btn-prime">Generate 3-Month View</button>
        </form>
    </div>

    <div id="dashboard-screen" class="dashboard-screen hidden">
        <header>
            <div>
                <div class="premium-header-text" id="dashboard-title">
                    <span style="color:#ffffff;">Hello, </span>
                    <span id="user-display-name" style="color:#e28da2;"></span>
                </div>
                <div id="user-meta-info" class="user-meta">--</div>
            </div>
            <button id="download-pdf-btn" class="btn-pdf">Export PDF Report</button>
        </header>
        <div id="pdf-content" class="continuum-grid-container">
            <div id="continuum-injection-target" class="continuum-grid-container"></div>
        </div>
    </div>

    <script>
        let userData = {};
        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            userData.name = document.getElementById('user-name').value;
            userData.age = document.getElementById('user-age').value;
            userData.lastPeriod = new Date(document.getElementById('last-period').value);
            userData.cycleLength = parseInt(document.getElementById('cycle-days').value);
            userData.periodDuration = parseInt(document.getElementById('period-duration').value);
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-meta-info').innerHTML =
            `Age ${userData.age} • Cycle ${userData.cycleLength} Days • Period ${userData.periodDuration} Days`;
            generateThreeMonthContinuum();
        });

        function generateThreeMonthContinuum() {
            const targetContainer = document.getElementById('continuum-injection-target');
            targetContainer.innerHTML = '';
            // 2. Show NEXT 3 MONTHS correctly
            for (let m = 1; m <= 3; m++) {
                let cycleStartAnchor = new Date(userData.lastPeriod);
                cycleStartAnchor.setDate(userData.lastPeriod.getDate() + (userData.cycleLength * (m - 1)));
                let bleedEndAnchor = new Date(cycleStartAnchor);
                bleedEndAnchor.setDate(cycleStartAnchor.getDate() + (userData.periodDuration - 1));
                
                // 3. Fix Ovulation (14 days before end of current cycle)
                let ovulationPeakAnchor = new Date(cycleStartAnchor);
                ovulationPeakAnchor.setDate(cycleStartAnchor.getDate() + userData.cycleLength - 14);
                
                renderSplitViewWorkspace(targetContainer, {
                    sequenceIndex: m,
                    periodStart: cycleStartAnchor,
                    periodEnd: bleedEndAnchor,
                    ovulationPeak: ovulationPeakAnchor,
                    monthRepresentation: cycleStartAnchor.getMonth(),
                    yearRepresentation: cycleStartAnchor.getFullYear()
                });
            }
        }

        function renderSplitViewWorkspace(container, matrix) {
            const monthLabels = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const dualWorkspaceBlock = document.createElement('div');
            dualWorkspaceBlock.className = 'month-dual-workspace';

            const cardTrack = document.createElement('div');
            cardTrack.className = 'month-card-track';
            cardTrack.innerHTML = `<div class="month-title-header">${monthLabels[matrix.monthRepresentation]} ${matrix.yearRepresentation}</div>`;
            
            const gridCore = document.createElement("div");
            gridCore.className = "calendar-grid-core";
            
            ["S","M","T","W","T","F","S"].forEach(day=>{
                const lbl=document.createElement("div");
                lbl.className="weekday-label";
                lbl.innerText=day;
                gridCore.appendChild(lbl);
            });
            
            const firstDay = new Date(matrix.yearRepresentation, matrix.monthRepresentation, 1).getDay();
            const totalDays = new Date(matrix.yearRepresentation, matrix.monthRepresentation + 1, 0).getDate();
            
            const fertileStart = new Date(matrix.ovulationPeak);
            fertileStart.setDate(fertileStart.getDate()-3);
            const fertileEnd = new Date(matrix.ovulationPeak);
            fertileEnd.setDate(fertileEnd.getDate()+3);
            
            // 3. Fix Early/Late Cycle
            const earlyCycle = new Date(matrix.periodStart);
            earlyCycle.setDate(earlyCycle.getDate()-3);
            const lateCycle = new Date(matrix.periodStart);
            lateCycle.setDate(lateCycle.getDate() + 3);

            for(let i=0; i<firstDay; i++) {
                const blank=document.createElement("div");
                blank.className="day-node-wrapper";
                gridCore.appendChild(blank);
            }
            
            for(let day=1; day<=totalDays; day++) {
                const wrapper=document.createElement("div");
                wrapper.className="day-node-wrapper";
                const cell=document.createElement("div");
                cell.className="day-node-element";
                cell.innerText=day;
                wrapper.appendChild(cell);
            
                const currentDate=new Date(matrix.yearRepresentation, matrix.monthRepresentation, day);
            
                if(currentDate >= matrix.periodStart && currentDate <= matrix.periodEnd){
                    wrapper.classList.add("period-bleed-span");
                }
                else if(currentDate >= fertileStart && currentDate <= fertileEnd){
                    wrapper.classList.add("fertility-window");
                    if(currentDate.toDateString() == matrix.ovulationPeak.toDateString()){
                        wrapper.classList.remove("fertility-window");
                        wrapper.classList.add("ovulation-peak-anchor");
                    }
                }
                else if(currentDate.toDateString() == earlyCycle.toDateString()){
                    wrapper.classList.add("early-cycle");
                }
                else if(currentDate.toDateString() == lateCycle.toDateString()){
                    wrapper.classList.add("late-cycle");
                }
                gridCore.appendChild(wrapper);
            }
            
            cardTrack.appendChild(gridCore);
            
            const formatDateStr = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            const sidebar = document.createElement('div');
            sidebar.className = 'month-details-sidebar';
            sidebar.innerHTML = `
                <div style="font-size:1.25rem; font-weight:600; margin-bottom:12px;">Cycle Breakdown</div>
                <div class="detail-row period-highlight"><span>🩸 Period Start</span><span>${formatDateStr(matrix.periodStart)}</span></div>
                <div class="detail-row period-highlight"><span>🩸 Period End</span><span>${formatDateStr(matrix.periodEnd)}</span></div>
                <div class="detail-row fertile-highlight"><span>🌸 Peak Fertility</span><span>${formatDateStr(fertileStart)} - ${formatDateStr(fertileEnd)}</span></div>
                <div class="detail-row earlylate-highlight"><span>🟢 Early Cycle</span><span>${formatDateStr(earlyCycle)}</span></div>
                <div class="detail-row earlylate-highlight"><span>🟠 Late Cycle</span><span>${formatDateStr(lateCycle)}</span></div>
            `;
            
            dualWorkspaceBlock.appendChild(cardTrack);
            dualWorkspaceBlock.appendChild(sidebar);
            container.appendChild(dualWorkspaceBlock);
        }
    </script>
</body>
</html>
