<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier — Premium Workspace Matrix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            /* Theme matching image_872423.png */
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-dark: rgba(40, 35, 70, 0.7);
            --color-period: #ff8fa3;
            --color-ovulation: #2a2d61;
            --color-early: #d4af37;
            --color-late: #1abc9c;
            --text-light: #f8f9fe;
            --text-muted: #b3b0c8;
        }

        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-light); 
            padding: 30px 15px; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
        }

        /* Sidebar Highlighting */
        .highlight-period { background: var(--color-period); color: #000 !important; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .highlight-peak { background: var(--color-ovulation); color: #fff !important; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .highlight-early { background: rgba(212, 175, 55, 0.2); color: var(--color-early) !important; padding: 2px 8px; border-radius: 4px; }
        .highlight-late { background: rgba(26, 188, 156, 0.2); color: var(--color-late) !important; padding: 2px 8px; border-radius: 4px; }

        .welcome-screen, .month-card-track, .month-details-sidebar {
            background: var(--card-dark);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        .welcome-screen { width: 100%; max-width: 500px; padding: 40px; text-align: center; }
        .dashboard-screen { width: 100%; max-width: 1100px; }
        .month-dual-workspace { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        
        @media (min-width: 850px) { .month-dual-workspace { grid-template-columns: 1.2fr 0.8fr; } }
        
        .month-details-sidebar { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .calendar-grid-core { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-node-element { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; border-radius: 50%; width: 35px; margin: auto; }
        .period-bleed-span .day-node-element { background: var(--color-period); color: #000; }
        .ovulation-peak-anchor .day-node-element { background: var(--color-ovulation); color: #fff; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-screen">
        <h1 style="font-family: 'Playfair Display'; margin-bottom: 20px;">Welcome Ma'am</h1>
        <form id="onboarding-form">
            <input type="text" id="user-name" placeholder="Name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;" required>
            <input type="date" id="last-period" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;" required>
            <input type="number" id="cycle-days" placeholder="Average Cycle Duration (Days)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;" required>
            <input type="number" id="period-duration" placeholder="Period Bleeding Duration (Days)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:none;" required>
            <button type="submit" style="width:100%; padding:12px; border-radius:8px; border:none; background:var(--color-period); cursor:pointer; font-weight:bold;">Launch Dashboard</button>
        </form>
    </div>

    <div id="dashboard-screen" class="dashboard-screen hidden">
        <header style="margin-bottom:30px;">
            <h1 id="greeting-title" style="font-family: 'Playfair Display';">Hello, Kalpana</h1>
        </header>
        <div id="continuum-injection-target"></div>
    </div>

    <script>
        let userData = {};
        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            userData = {
                name: document.getElementById('user-name').value,
                lastPeriod: new Date(document.getElementById('last-period').value),
                cycleLength: parseInt(document.getElementById('cycle-days').value),
                periodDuration: parseInt(document.getElementById('period-duration').value)
            };
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('greeting-title').innerText = `Hello, ${userData.name}`;
            generateContinuum();
        });

        function generateContinuum() {
            const target = document.getElementById('continuum-injection-target');
            for (let m = 1; m <= 3; m++) {
                let start = new Date(userData.lastPeriod); start.setDate(start.getDate() + (userData.cycleLength * m));
                let end = new Date(start); end.setDate(start.getDate() + userData.periodDuration - 1);
                let peak = new Date(start); peak.setDate(start.getDate() - 14);
                
                const block = document.createElement('div');
                block.className = 'month-dual-workspace';
                block.innerHTML = `
                    <div class="month-card-track">
                        <div style="margin-bottom:15px; font-weight:700;">${start.toLocaleString('default', { month: 'long' })}</div>
                        <div class="calendar-grid-core"></div>
                    </div>
                    <div class="month-details-sidebar">
                        <div class="detail-row"><span>Early Buffer (-3d)</span><span class="highlight-early">${new Date(start.getTime() - 259200000).toLocaleDateString()}</span></div>
                        <div class="detail-row"><span>Estimated Period Start</span><span class="highlight-period">${start.toLocaleDateString()}</span></div>
                        <div class="detail-row"><span>Peak Fertility Window</span><span class="highlight-peak">${peak.toLocaleDateString()}</span></div>
                        <div class="detail-row"><span>Late Buffer (+3d)</span><span class="highlight-late">${new Date(end.getTime() + 259200000).toLocaleDateString()}</span></div>
                    </div>
                `;
                target.appendChild(block);
            }
        }
    </script>
</body>
</html>
