<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier — Professional Continuum Workspace</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2pdf Framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #06070a;
            --card-dark: #0f111a;
            --input-bg: #151824;
            --border-gold: rgba(212, 175, 55, 0.1);
            --luxury-gold: #d4af37;
            --rose-gold: #e5ad9f;
            
            /* Logic Color Matrix Standards */
            --bleed-dark: #b32d43;
            --bleed-gradient: linear-gradient(90deg, #9e2235 0%, #cc3f55 100%);
            --early-gold-lite: rgba(212, 175, 55, 0.06);
            --late-teal-lite: rgba(26, 188, 156, 0.06);
            --ovulation-peak: #8e44ad;
            
            --text-light: #f1f5f9;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 40px 25px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        /* Symmetric Form Setup Architecture */
        .welcome-screen {
            width: 100%;
            max-width: 620px;
            margin: auto;
            background: linear-gradient(145deg, #111322 0%, #090a12 100%);
            padding: 50px;
            border-radius: 28px;
            border: 1px solid var(--border-gold);
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.4rem;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 20%, var(--rose-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 14px;
            font-size: 0.95rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 15px rgba(229, 173, 159, 0.12);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(79%) sepia(20%) saturate(600%) hue-rotate(320deg) brightness(95%) contrast(90%);
        }

        button.btn-prime {
            background: linear-gradient(135deg, var(--rose-gold) 0%, #ca9082 100%);
            color: #06070a;
            border: none;
            padding: 18px 30px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        button.btn-prime:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 35px rgba(229, 173, 159, 0.25);
        }

        /* Dashboard Main Layout Workspaces */
        .dashboard-screen {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 35px;
        }

        .premium-header-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 500;
        }

        .user-meta {
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .btn-pdf {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--rose-gold);
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-pdf:hover {
            border-color: var(--rose-gold);
            background: rgba(229, 173, 159, 0.03);
        }

        /* 3-Month Matrix Container Blocks */
        .continuum-grid-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .month-card-track {
            background: var(--card-dark);
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        .month-title-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-badge-index {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 30px;
            color: var(--rose-gold);
        }

        /* Modular Precise Matrix Engine */
        .calendar-grid-core {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 12px;
            column-gap: 0px;
            text-align: center;
        }

        .weekday-label {
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 12px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .day-node-wrapper {
            position: relative;
            padding: 2px 0;
        }

        .day-node-element {
            aspect-ratio: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
            position: relative;
            z-index: 2;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .day-node-wrapper.has-base-fill .day-node-element {
            background: #131622;
        }

        .day-micro-tag {
            position: absolute;
            bottom: 3px;
            font-size: 0.5rem;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        /* 🩸 RULE 1: DARK MARKED PERIOD CAPSULES (START TO END BOUNDS) */
        .day-node-wrapper.period-bleed-span {
            background: var(--bleed-gradient);
            border-radius: 0px;
        }
        .day-node-wrapper.period-bleed-span .day-node-element {
            color: #ffffff !important;
            font-weight: 700;
            background: transparent !important;
        }
        .day-node-wrapper.bleed-start-cap {
            border-top-left-radius: 50% !important;
            border-bottom-left-radius: 50% !important;
        }
        .day-node-wrapper.bleed-end-cap {
            border-top-right-radius: 50% !important;
            border-bottom-right-radius: 50% !important;
        }

        /* 🌟 RULE 2: LIGHT MARKED EARLY & LATE PREDICTIONS */
        .day-node-wrapper.early-buffer-zone {
            background-color: var(--early-gold-lite);
            border-top: 1px dashed rgba(212, 175, 55, 0.3);
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
        }
        .day-node-wrapper.early-buffer-zone.buffer-start-cap {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-left: 1px dashed rgba(212, 175, 55, 0.3);
        }
        .day-node-wrapper.early-buffer-zone .day-node-element {
            color: #e2ba43;
            font-weight: 600;
        }

        .day-node-wrapper.late-buffer-zone {
            background-color: var(--late-teal-lite);
            border-top: 1px dashed rgba(26, 188, 156, 0.3);
            border-bottom: 1px dashed rgba(26, 188, 156, 0.3);
        }
        .day-node-wrapper.late-buffer-zone.buffer-end-cap {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-right: 1px dashed rgba(26, 188, 156, 0.3);
        }
        .day-node-wrapper.late-buffer-zone .day-node-element {
            color: #1abc9c;
            font-weight: 600;
        }

        /* 🔮 RULE 3: HORMONAL WAVE GRADIENT OVULATION PHASES */
        .day-node-wrapper.ovulation-wave-1 .day-node-element { background: rgba(142, 68, 173, 0.08); color: #d6a2e8; }
        .day-node-wrapper.ovulation-wave-2 .day-node-element { background: rgba(142, 68, 173, 0.18); color: #e0b0ff; }
        .day-node-wrapper.ovulation-wave-3 .day-node-element { background: rgba(142, 68, 173, 0.32); color: #f3e5ab; font-weight: 600; }
        .day-node-wrapper.ovulation-wave-4 .day-node-element { background: rgba(142, 68, 173, 0.45); color: #ffffff; font-weight: 600; }
        
        /* Absolute Peak Center Point */
        .day-node-wrapper.ovulation-peak-center .day-node-element {
            background: var(--ovulation-peak) !important;
            color: #ffffff !important;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(142, 68, 173, 0.6);
            border-radius: 50% !important;
        }

        /* Universal Master Legends Tray */
        .master-legend-card {
            background: var(--card-dark);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.02);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .legend-swatch {
            width: 24px;
            height: 16px;
            border-radius: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- 1. FORM ARRANGEMENT GRID LAYER -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-title">Cycle Atelier</div>
        <p>Advanced predictive engine mapping three consecutive computational horizons.</p>
        
        <form id="onboarding-form">
            <!-- Row 1: Name and Age -->
            <div class="form-row">
                <div class="form-group">
                    <label for="user-name">First Name</label>
                    <input type="text" id="user-name" placeholder="Sarah" required>
                </div>
                <div class="form-group" style="flex: 0 0 150px;">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" min="10" max="100" placeholder="26" required>
                </div>
            </div>

            <!-- Row 2: Last Period Begin Isolated -->
            <div class="form-row">
                <div class="form-group">
                    <label for="last-period">When did your last period begin?</label>
                    <input type="date" id="last-period" required>
                </div>
            </div>

            <!-- Row 3: Cycle & Bleeding Parameters -->
            <div class="form-row">
                <div class="form-group">
                    <label for="cycle-days">Average Cycle Duration</label>
                    <input type="number" id="cycle-days" min="22" max="45" value="28" required>
                </div>
                <div class="form-group">
                    <label for="period-duration">Period Bleeding Duration (Days)</label>
                    <input type="number" id="period-duration" min="2" max="10" value="5" required>
                </div>
            </div>

            <button type="submit" class="btn-prime">Initialize 3-Month Projection Matrix</button>
        </form>
    </div>

    <!-- 2. HIGH-FIDELITY ACTIVE SYSTEM DASHBOARD -->
    <div id="dashboard-screen" class="dashboard-screen hidden">
        <header>
            <div>
                <div class="premium-header-text">Workspace Continuum</div>
                <div id="user-meta-info" class="user-meta">--</div>
            </div>
            <button id="download-pdf-btn" class="btn-pdf">Export Multi-Month Analytics Matrix</button>
        </header>

        <div class="continuum-grid-container" id="pdf-content">
            
            <!-- MASTER SYSTEM LEGENDS TRAY ELEMENT -->
            <div class="master-legend-card">
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--early-gold-lite); border: 1px dashed rgba(212, 175, 55, 0.4);"></div>
                    <span>Early Prediction Window (-3d Buffer)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--bleed-gradient);"></div>
                    <span style="color: var(--rose-gold); font-weight:600;">True Bleed Capsule (Start to End)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--late-teal-lite); border: 1px dashed rgba(26, 188, 156, 0.4);"></div>
                    <span>Late Prediction Window (+3d Buffer)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: linear-gradient(90deg, rgba(142,68,173,0.1) 0%, var(--ovulation-peak) 100%);"></div>
                    <span>Hormonal Ovulation Wave (Gradient Shift)</span>
                </div>
            </div>

            <!-- Dynamic Multi-Month Continuum Injection Targets -->
            <div id="continuum-injection-target" class="continuum-grid-container"></div>
        </div>
    </div>

    <script>
        let userData = {};

        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();

            userData.name = document.getElementById('user-name').value;
            userData.age = document.getElementById('user-age').value;
            userData.lastPeriod = new Date(document.getElementById('last-period').value);
            userData.cycleLength = parseInt(document.getElementById('cycle-days').value);
            userData.periodDuration = parseInt(document.getElementById('period-duration').value);

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');

            document.getElementById('user-meta-info').innerText = 
                `Analytic Target: ${userData.name} (Age ${userData.age})  |  Cycle Metric: ${userData.cycleLength} Days  |  Bleed Horizon: ${userData.periodDuration} Days`;

            generateThreeMonthContinuum();
        });

        function generateThreeMonthContinuum() {
            const targetContainer = document.getElementById('continuum-injection-target');
            targetContainer.innerHTML = ''; // Reset workspace layout container maps

            // Seed calculations matrices frames array steps
            let structuralAnchorDates = [];
            
            // Loop calculation loops precisely step-scaling baseline indexes parameters
            for (let m = 1; m <= 3; m++) {
                let cycleStartAnchor = new Date(userData.lastPeriod);
                cycleStartAnchor.setDate(userData.lastPeriod.getDate() + (userData.cycleLength * m));

                let bleedEndAnchor = new Date(cycleStartAnchor);
                bleedEndAnchor.setDate(cycleStartAnchor.getDate() + (userData.periodDuration - 1));

                let ovulationPeakAnchor = new Date(cycleStartAnchor);
                ovulationPeakAnchor.setDate(cycleStartAnchor.getDate() - 14);

                structuralAnchorDates.push({
                    sequenceIndex: m,
                    periodStart: cycleStartAnchor,
                    periodEnd: bleedEndAnchor,
                    ovulationPeak: ovulationPeakAnchor,
                    monthRepresentation: cycleStartAnchor.getMonth(),
                    yearRepresentation: cycleStartAnchor.getFullYear()
                });
            }

            // Render absolute decoupled calendars per tracking block module target array
            structuralAnchorDates.forEach(matrixData => {
                renderContinuumMonthCard(targetContainer, matrixData);
            });
        }

        function renderContinuumMonthCard(container, matrix) {
            const monthLabels = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const cardTrack = document.createElement('div');
            cardTrack.className = 'month-card-track';

            const header = document.createElement('div');
            header.className = 'month-title-header';
            header.innerHTML = `
                <span>${monthLabels[matrix.monthRepresentation]} ${matrix.yearRepresentation}</span>
                <span class="month-badge-index">Forecast Horizon Matrix 0${matrix.sequenceIndex}</span>
            `;
            cardTrack.appendChild(header);

            const gridCore = document.createElement('div');
            gridCore.className = 'calendar-grid-core';

            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(wk => {
                const label = document.createElement('div');
                label.className = 'weekday-label';
                label.innerText = wk;
                gridCore.appendChild(label);
            });

            const firstDayIndex = new Date(matrix.yearRepresentation, matrix.monthRepresentation, 1).getDay();
            const totalDaysInMonth = new Date(matrix.yearRepresentation, matrix.monthRepresentation + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyNode = document.createElement('div');
                emptyNode.className = 'day-node-wrapper empty';
                gridCore.appendChild(emptyNode);
            }

            // Absolute processing loop evaluation mappings metrics calculations rules boundaries
            for (let day = 1; day <= totalDaysInMonth; day++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'day-node-wrapper has-base-fill';

                const cell = document.createElement('div');
                cell.className = 'day-node-element';
                cell.innerText = day;
                wrapper.appendChild(cell);

                const currentEvalDate = new Date(matrix.yearRepresentation, matrix.monthRepresentation, day);
                const tag = document.createElement('span');
                tag.className = 'day-micro-tag';

                // Buffer definitions arrays parsing conditions vectors metrics rules
                let earlyPredictionThresholdStart = new Date(matrix.periodStart);
                earlyPredictionThresholdStart.setDate(matrix.periodStart.getDate() - 3);

                let latePredictionThresholdEnd = new Date(matrix.periodEnd);
                latePredictionThresholdEnd.setDate(matrix.periodEnd.getDate() + 3);

                // --- PRECISION INTERACTION MATRIX LAYERS COMPILATION RULES ---
                
                // RULE 1: MASTER SOLID HIGHLIGHT BLEED CAP (HIGHEST PRIORITY VECTOR MATCH)
                if (currentEvalDate >= matrix.periodStart && currentEvalDate <= matrix.periodEnd) {
                    wrapper.classList.add('period-bleed-span');
                    if (currentEvalDate.toDateString() === matrix.periodStart.toDateString()) {
                        wrapper.classList.add('bleed-start-cap');
                        tag.innerText = 'Start';
                        tag.style.color = '#fff';
                        cell.appendChild(tag);
                    } else if (currentEvalDate.toDateString() === matrix.periodEnd.toDateString()) {
                        wrapper.classList.add('bleed-end-cap');
                        tag.innerText = 'End';
                        tag.style.color = '#fff';
                        cell.appendChild(tag);
                    } else {
                        tag.innerText = 'Bleed';
                        tag.style.color = 'rgba(255,255,255,0.4)';
                        cell.appendChild(tag);
                    }
                }
                // RULE 2: EARLY PREDICTION LIGHT MARKER MATRIX WINDOWS
                else if (currentEvalDate >= earlyPredictionThresholdStart && currentEvalDate < matrix.periodStart) {
                    wrapper.classList.add('early-buffer-zone');
                    if (currentEvalDate.toDateString() === earlyPredictionThresholdStart.toDateString()) {
                        wrapper.classList.add('buffer-start-cap');
                    }
                    tag.innerText = 'Early';
                    tag.style.color = 'rgba(212, 175, 55, 0.6)';
                    cell.appendChild(tag);
                }
                // RULE 3: LATE PREDICTION LIGHT MARKER MATRIX WINDOWS
                else if (currentEvalDate > matrix.periodEnd && currentEvalDate <= latePredictionThresholdEnd) {
                    wrapper.classList.add('late-buffer-zone');
                    if (currentEvalDate.toDateString() === latePredictionThresholdEnd.toDateString()) {
                        wrapper.classList.add('buffer-end-cap');
                    }
                    tag.innerText = 'Late Buffer';
                    tag.style.color = 'rgba(26, 188, 156, 0.6)';
                    cell.appendChild(tag);
                }
                // RULE 4: HORMONAL WAVE INTERPOLATION (STEP SHADINGS CLOSER TO CENTER PEAK)
                else {
                    let dayDifferenceFromPeak = Math.round((currentEvalDate - matrix.ovulationPeak) / (1000 * 60 * 60 * 24));
                    
                    if (dayDifferenceFromPeak === 0) {
                        wrapper.className = 'day-node-wrapper ovulation-peak-center';
                        tag.innerText = 'Peak';
                        tag.style.color = '#ffffff';
                        cell.appendChild(tag);
                    } else if (dayDifferenceFromPeak === -1 || dayDifferenceFromPeak === 1) {
                        wrapper.classList.add('ovulation-wave-4');
                        tag.innerText = 'High';
                        cell.appendChild(tag);
                    } else if (dayDifferenceFromPeak === -2 || dayDifferenceFromPeak === 2) {
                        wrapper.classList.add('ovulation-wave-3');
                        tag.innerText = 'Fertile';
                        cell.appendChild(tag);
                    } else if (dayDifferenceFromPeak === -3 || dayDifferenceFromPeak === 3) {
                        wrapper.classList.add('ovulation-wave-2');
                        tag.innerText = 'Wave';
                        cell.appendChild(tag);
                    } else if (dayDifferenceFromPeak === -4 || dayDifferenceFromPeak === -5) {
                        wrapper.classList.add('ovulation-wave-1');
                        tag.innerText = 'Onset';
                        cell.appendChild(tag);
                    }
                }

                gridCore.appendChild(wrapper);
            }

            cardTrack.appendChild(gridCore);
            container.appendChild(cardTrack);
        }

        // Vector Export Rendering Module Controller Hooks 
        document.getElementById('download-pdf-btn').addEventListener('click', function() {
            const element = document.getElementById('pdf-content');
            const pdfOptions = {
                margin:       12,
                filename:     `${userData.name || 'User'}_90Day_Atelier_Continuum_Report.pdf`,
                image:        { type: 'jpeg', quality: 0.99 },
                html2canvas:  { scale: 2.2, logging: false, backgroundColor: '#06070a' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(pdfOptions).from(element).save();
        });
    </script>
</body>
</html>
