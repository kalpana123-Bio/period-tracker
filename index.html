<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier — Elite Architectural Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            /* Luxury Core Palette */
            --bg-dark: #05060a;
            --card-dark: #0e1017;
            --input-bg: #141722;
            --border-gold: rgba(212, 175, 55, 0.08);
            --luxury-gold: #d4af37;
            --rose-gold: #e5ad9f;
            
            /* Primary Cycles Matrix (Backgrounds) */
            --bleed-gradient: linear-gradient(135deg, #991f30 0%, #cc3b50 100%);
            --ovulation-base-hue: 282, 44%, 47%; /* Purple Wave HSL */
            --early-gold-lite: rgba(212, 175, 55, 0.05);
            --late-teal-lite: rgba(26, 188, 156, 0.05);
            
            /* Secondary Energy Phases Matrix (Under-dots) */
            --phase-follicular: #1abc9c;
            --phase-luteal: #d4af37;

            --text-light: #f1f5f9;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 40px 25px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Concierge Level Entry Interface */
        .welcome-screen {
            width: 100%;
            max-width: 620px;
            margin: auto;
            background: linear-gradient(145deg, #10121f 0%, #080911 100%);
            padding: 55px 50px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            text-align: center;
            box-shadow: 0 40px 90px rgba(0,0,0,0.85);
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 30%, var(--rose-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 45px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .form-row { display: flex; gap: 20px; margin-bottom: 24px; }
        .form-group { flex: 1; display: flex; flex-direction: column; text-align: left; }

        label {
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            font-size: 0.95rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 15px rgba(229, 173, 159, 0.1);
        }

        button.btn-prime {
            background: linear-gradient(135deg, var(--rose-gold) 0%, #ca9082 100%);
            color: #05060a;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        button.btn-prime:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 35px rgba(229, 173, 159, 0.2);
        }

        /* Workspace Main Dashboard Viewport */
        .dashboard-screen { width: 100%; max-width: 1300px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 35px;
        }

        .premium-header-text { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 500; }
        .user-meta { color: var(--text-muted); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

        .btn-pdf {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--rose-gold);
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-pdf:hover { border-color: var(--rose-gold); background: rgba(229, 173, 159, 0.02); }

        .continuum-grid-container { display: flex; flex-direction: column; gap: 35px; }

        .month-card-track {
            background: var(--card-dark);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.01);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        .month-title-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-badge-index {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.04);
            padding: 6px 14px;
            border-radius: 30px;
            color: var(--rose-gold);
        }

        /* Calendar Layout Architecture Grid */
        .calendar-grid-core {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 16px;
            column-gap: 0px;
            text-align: center;
        }

        .weekday-label {
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .day-node-wrapper { position: relative; padding: 4px 0; }

        .day-node-element {
            aspect-ratio: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
            position: relative;
            z-index: 2;
            border-radius: 50%;
        }

        .day-node-wrapper.has-base-fill .day-node-element { background: #11131c; }

        /* Secondary Layer Tags & Dots Indicators */
        .day-micro-tag {
            position: absolute;
            bottom: 4px;
            font-size: 0.48rem;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        .moon-icon-slot {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.65rem;
            z-index: 5;
            color: var(--luxury-gold);
            opacity: 0.85;
        }

        .energy-phase-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        /* Visual State Matrix Mappings */
        /* Bleed Window */
        .day-node-wrapper.period-bleed-span { background: var(--bleed-gradient); border-radius: 0; }
        .day-node-wrapper.period-bleed-span .day-node-element { color: #fff !important; font-weight: 700; background: transparent !important; }
        .day-node-wrapper.bleed-start-cap { border-top-left-radius: 50% !important; border-bottom-left-radius: 50% !important; }
        .day-node-wrapper.bleed-end-cap { border-top-right-radius: 50% !important; border-bottom-right-radius: 50% !important; }

        /* Buffer Variations */
        .day-node-wrapper.early-buffer-zone { background-color: var(--early-gold-lite); border-top: 1px dashed rgba(212, 175, 55, 0.2); border-bottom: 1px dashed rgba(212, 175, 55, 0.2); }
        .day-node-wrapper.early-buffer-zone.buffer-start-cap { border-top-left-radius: 12px; border-bottom-left-radius: 12px; border-left: 1px dashed rgba(212, 175, 55, 0.2); }
        .day-node-wrapper.early-buffer-zone .day-node-element { color: #d4af37; }

        .day-node-wrapper.late-buffer-zone { background-color: var(--late-teal-lite); border-top: 1px dashed rgba(26, 188, 156, 0.2); border-bottom: 1px dashed rgba(26, 188, 156, 0.2); }
        .day-node-wrapper.late-buffer-zone.buffer-end-cap { border-top-right-radius: 12px; border-bottom-right-radius: 12px; border-right: 1px dashed rgba(26, 188, 156, 0.2); }
        .day-node-wrapper.late-buffer-zone .day-node-element { color: #1abc9c; }

        /* Ovulation Dynamic Shading Wave */
        .day-node-wrapper.ovulation-wave-node .day-node-element { background: hsla(var(--ovulation-base-hue), var(--wave-alpha)) !important; color: #ffffff; border-radius: 50% !important; }
        .day-node-wrapper.ovulation-peak-anchor .day-node-element { background: hsl(var(--ovulation-base-hue)) !important; color: #ffffff !important; font-weight: 700; box-shadow: 0 4px 18px hsla(var(--ovulation-base-hue), 0.5); border-radius: 50% !important; }

        /* Legend Style Matrix */
        .master-legend-card {
            background: var(--card-dark);
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.01);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .legend-item { display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: var(--text-muted); }
        .legend-swatch { width: 24px; height: 14px; border-radius: 4px; flex-shrink: 0; }
        .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-title">Cycle Atelier — Welcome Ma'am</div>
        <p>Premium architectural forecasting engine mapping 3 consecutive multi-cycle horizons.</p>
        
        <form id="onboarding-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="user-name">First Name</label>
                    <input type="text" id="user-name" placeholder="Sarah" required>
                </div>
                <div class="form-group" style="flex: 0 0 150px;">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" min="10" max="100" placeholder="26" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="last-period">When did your last period begin?</label>
                    <input type="date" id="last-period" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cycle-days">Average Cycle Occurrence</label>
                    <input type="number" id="cycle-days" min="22" max="45" value="28" required>
                </div>
                <div class="form-group">
                    <label for="period-duration">Average Bleeding Duration</label>
                    <input type="number" id="period-duration" min="2" max="10" value="5" required>
                </div>
            </div>
            <button type="submit" class="btn-prime">Initialize Systems Matrix</button>
        </form>
    </div>

    <div id="dashboard-screen" class="dashboard-screen hidden">
        <header>
            <div>
                <div class="premium-header-text">Workspace Continuum — Hello, <span id="display-name">Name</span></div>
                <div id="user-meta-info" class="user-meta">--</div>
            </div>
            <button id="download-pdf-btn" class="btn-pdf">Export Continuum Vector Map</button>
        </header>

        <div class="continuum-grid-container" id="pdf-content">
            <div class="master-legend-card">
                <div class="legend-item">
                    <div class="legend-swatch" style="background: var(--bleed-gradient);"></div>
                    <span style="color: var(--rose-gold); font-weight:600;">True Bleed Window</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: linear-gradient(90deg, hsla(var(--ovulation-base-hue), 0.08) 0%, hsl(var(--ovulation-base-hue)) 100%);"></div>
                    <span>Ovulation Gradient Wave</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--phase-follicular);"></div>
                    <span>Follicular Phase (Rising Vitality)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--phase-luteal);"></div>
                    <span>Luteal Phase (Reflective Output)</span>
                </div>
                <div class="legend-item">
                    <span style="color: var(--luxury-gold); font-size: 0.9rem;">🌑 / 🌕</span>
                    <span>Lunar Synchronization Nodes</span>
                </div>
            </div>

            <div id="continuum-injection-target" class="continuum-grid-container"></div>
        </div>
    </div>

    <script>
        let userData = {};

        // Approximate Synodic Lunar Tracking Constants
        const LUNAR_KNOB_EPOCH = new Date(2026, 0, 18); // Reference Known New Moon: Jan 18, 2026
        const LUNAR_CYCLE_LENGTH = 29.53059;

        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            userData.name = document.getElementById('user-name').value;
            userData.age = document.getElementById('user-age').value;
            userData.lastPeriod = new Date(document.getElementById('last-period').value);
            userData.cycleLength = parseInt(document.getElementById('cycle-days').value);
            userData.periodDuration = parseInt(document.getElementById('period-duration').value);

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = userData.name;
            document.getElementById('user-meta-info').innerText = 
                `Tracking Metrics: Age ${userData.age} | Occurrence Cycle: ${userData.cycleLength} Days | Bleed Metric: ${userData.periodDuration} Days`;

            generateThreeMonthContinuum();
        });

        function generateThreeMonthContinuum() {
            const targetContainer = document.getElementById('continuum-injection-target');
            targetContainer.innerHTML = ''; 

            let structuralAnchorDates = [];
            
            for (let m = 1; m <= 3; m++) {
                let cycleStartAnchor = new Date(userData.lastPeriod);
                cycleStartAnchor.setDate(userData.lastPeriod.getDate() + (userData.cycleLength * m));

                let bleedEndAnchor = new Date(cycleStartAnchor);
                bleedEndAnchor.setDate(cycleStartAnchor.getDate() + (userData.periodDuration - 1));

                let ovulationPeakAnchor = new Date(cycleStartAnchor);
                ovulationPeakAnchor.setDate(cycleStartAnchor.getDate() - 14);

                structuralAnchorDates.push({
                    sequenceIndex: m,
                    periodStart: cycleStartAnchor,
                    periodEnd: bleedEndAnchor,
                    ovulationPeak: ovulationPeakAnchor,
                    monthRepresentation: cycleStartAnchor.getMonth(),
                    yearRepresentation: cycleStartAnchor.getFullYear()
                });
            }

            structuralAnchorDates.forEach(matrixData => {
                renderContinuumMonthCard(targetContainer, matrixData);
            });
        }

        function calculateLunarSymbol(targetDate) {
            let timeDiff = targetDate - LUNAR_KNOB_EPOCH;
            let daysDiff = timeDiff / (1000 * 60 * 60 * 24);
            let ageOfMoon = ((daysDiff % LUNAR_CYCLE_LENGTH) + LUNAR_CYCLE_LENGTH) % LUNAR_CYCLE_LENGTH;
            
            if (ageOfMoon < 1 || ageOfMoon > LUNAR_CYCLE_LENGTH - 1) return '🌑'; // New Moon
            if (Math.abs(ageOfMoon - LUNAR_CYCLE_LENGTH / 2) < 1) return '🌕';    // Full Moon
            return null;
        }

        function renderContinuumMonthCard(container, matrix) {
            const monthLabels = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const cardTrack = document.createElement('div');
            cardTrack.className = 'month-card-track';

            const header = document.createElement('div');
            header.className = 'month-title-header';
            header.innerHTML = `
                <span>${monthLabels[matrix.monthRepresentation]} ${matrix.yearRepresentation}</span>
                <span class="month-badge-index">Forecast Horizon Matrix 0${matrix.sequenceIndex}</span>
            `;
            cardTrack.appendChild(header);

            const gridCore = document.createElement('div');
            gridCore.className = 'calendar-grid-core';

            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(wk => {
                const label = document.createElement('div');
                label.className = 'weekday-label';
                label.innerText = wk;
                gridCore.appendChild(label);
            });

            const firstDayIndex = new Date(matrix.yearRepresentation, matrix.monthRepresentation, 1).getDay();
            const totalDaysInMonth = new Date(matrix.yearRepresentation, matrix.monthRepresentation + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                gridCore.appendChild(Object.assign(document.createElement('div'), { className: 'day-node-wrapper empty' }));
            }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'day-node-wrapper has-base-fill';

                const cell = document.createElement('div');
                cell.className = 'day-node-element';
                cell.innerText = day;
                wrapper.appendChild(cell);

                const currentEvalDate = new Date(matrix.yearRepresentation, matrix.monthRepresentation, day);
                const tag = document.createElement('span');
                tag.className = 'day-micro-tag';

                // 1. Core Menstrual Tracker Node Pipeline Execution
                let earlyPredictionThresholdStart = new Date(matrix.periodStart);
                earlyPredictionThresholdStart.setDate(matrix.periodStart.getDate() - 3);

                let latePredictionThresholdEnd = new Date(matrix.periodEnd);
                latePredictionThresholdEnd.setDate(matrix.periodEnd.getDate() + 3);

                if (currentEvalDate >= matrix.periodStart && currentEvalDate <= matrix.periodEnd) {
                    wrapper.className = 'day-node-wrapper period-bleed-span';
                    if (currentEvalDate.toDateString() === matrix.periodStart.toDateString()) {
                        wrapper.classList.add('bleed-start-cap');
                        tag.innerText = 'Start'; tag.style.color = '#fff'; cell.appendChild(tag);
                    } else if (currentEvalDate.toDateString() === matrix.periodEnd.toDateString()) {
                        wrapper.classList.add('bleed-end-cap');
                        tag.innerText = 'End'; tag.style.color = '#fff'; cell.appendChild(tag);
                    }
                }
                else if (currentEvalDate >= earlyPredictionThresholdStart && currentEvalDate < matrix.periodStart) {
                    wrapper.className = 'day-node-wrapper early-buffer-zone';
                    if (currentEvalDate.toDateString() === earlyPredictionThresholdStart.toDateString()) wrapper.classList.add('buffer-start-cap');
                }
                else if (currentEvalDate > matrix.periodEnd && currentEvalDate <= latePredictionThresholdEnd) {
                    wrapper.className = 'day-node-wrapper late-buffer-zone';
                    if (currentEvalDate.toDateString() === latePredictionThresholdEnd.toDateString()) wrapper.classList.add('buffer-end-cap');
                }
                // Ovulation Layer Process Rule
                else {
                    let dayDifferenceFromPeak = Math.round((currentEvalDate - matrix.ovulationPeak) / (1000 * 60 * 60 * 24));
                    if (dayDifferenceFromPeak === 0) {
                        wrapper.className = 'day-node-wrapper ovulation-peak-anchor';
                        tag.innerText = 'Peak'; tag.style.color = '#ffffff'; cell.appendChild(tag);
                    } else if (Math.abs(dayDifferenceFromPeak) <= 4) {
                        wrapper.className = 'day-node-wrapper ovulation-wave-node';
                        let alphas = {1: '0.45', 2: '0.28', 3: '0.15', 4: '0.06'};
                        wrapper.style.setProperty('--wave-alpha', alphas[Math.abs(dayDifferenceFromPeak)]);
                    }
                }

                // 2. Secondary Systems: Layering Hormonal Energy Cycles
                if (currentEvalDate > matrix.periodEnd && currentEvalDate < matrix.ovulationPeak) {
                    const dot = document.createElement('div');
                    dot.className = 'energy-phase-dot';
                    dot.style.backgroundColor = 'var(--phase-follicular)';
                    wrapper.appendChild(dot);
                } else if (currentEvalDate > matrix.ovulationPeak && currentEvalDate < matrix.periodStart) {
                    const dot = document.createElement('div');
                    dot.className = 'energy-phase-dot';
                    dot.style.backgroundColor = 'var(--phase-luteal)';
                    wrapper.appendChild(dot);
                }

                // 3. Secondary Systems: Layering Lunar Alignment Nodes
                let moonSymbol = calculateLunarSymbol(currentEvalDate);
                if (moonSymbol) {
                    const moonSlot = document.createElement('div');
                    moonSlot.className = 'moon-icon-slot';
                    moonSlot.innerText = moonSymbol;
                    wrapper.appendChild(moonSlot);
                }

                gridCore.appendChild(wrapper);
            }

            cardTrack.appendChild(gridCore);
            container.appendChild(cardTrack);
        }

        // Vector PDF Pipeline
        document.getElementById('download-pdf-btn').addEventListener('click', function() {
            const element = document.getElementById('pdf-content');
            html2pdf().set({
                margin: 12,
                filename: `${userData.name || 'User'}_Atelier_90Day_Continuum.pdf`,
                image: { type: 'jpeg', quality: 0.99 },
                html2canvas: { scale: 2.2, backgroundColor: '#05060a' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        });
    </script>
</body>
</html>
