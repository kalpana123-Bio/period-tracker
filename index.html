<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Atelier</title>
    <style>
        /* Essential styles to prevent blank screen */
        body { background: #0b0a15; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .welcome-screen { background: #151226; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #e28da2; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-screen">
        <h1>Welcome Ma'am</h1>
        <form id="onboarding-form">
            <input type="text" id="user-name" placeholder="Name" required>
            <input type="date" id="last-period" required>
            <input type="number" id="cycle-days" placeholder="Cycle Duration (e.g. 28)" required>
            <input type="number" id="period-duration" placeholder="Bleed Duration (e.g. 5)" required>
            <button type="submit">Launch Dashboard</button>
        </form>
    </div>

    <div id="dashboard-screen" class="hidden" style="width: 90%; max-width: 800px; padding: 20px;">
        <h1 id="greeting">Hello</h1>
        <div id="target"></div>
    </div>

    <script>
        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('user-name').value;
            const lastPeriod = new Date(document.getElementById('last-period').value);
            const cycle = parseInt(document.getElementById('cycle-days').value);
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('greeting').innerText = `Hello, ${name}`;
            
            const target = document.getElementById('target');
            for (let m = 1; m <= 3; m++) {
                let start = new Date(lastPeriod); start.setDate(lastPeriod.getDate() + (cycle * m));
                let peak = new Date(start); peak.setDate(start.getDate() - 14);
                let early = new Date(start); early.setDate(start.getDate() - 3);
                let late = new Date(start); late.setDate(start.getDate() + 3);

                target.innerHTML += `
                    <div style="background:#1b1730; padding:20px; margin:10px 0; border-radius:10px;">
                        <h3>${start.toLocaleDateString()}</h3>
                        <p>Early (-3d): <b>${early.toLocaleDateString()}</b></p>
                        <p style="color:#e28da2">Start: <b>${start.toLocaleDateString()}</b></p>
                        <p style="color:#5c7aff">Peak Fertility: <b>${peak.toLocaleDateString()}</b></p>
                        <p>Late (+3d): <b>${late.toLocaleDateString()}</b></p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
